<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<head>
<body>
    <div class="container">
        <header>
            <h1>LeetCode Tracker</h1>
            <div class="search-box">
                <input type="text" id="usernameInput" placeholder="Kullanıcı adı girin...">
                <button id="searchBtn">Ara</button>
            </div>
        </header>

        <div id="loadingMsg" class="mesage-box loading hidden">Veriler çekiliyor, lütfen bekleyin...</div>
        <div id="errorMsg" class="mesage-box error hidden">Kullanıcı bulunamadı veya sunucu hatası!</div>

        <main id="statsContainer" class="hidden">
            <section class = "goal-section" style="text-align: center; margin-bottom: 25px; padding: 20px; background-color: var(--card-bg); border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <h3>🎯Set Your Weekly Goal</h3>
                <div style="display: flex; justify-content: center; gap: 10px; align-items: center; margin-top: 10px; margin-bottom: 20px;">
                    <input type="number" id="goalInput" placeholder="Ex: 20" min="1" style="width: 100px; text-align: center;">
                    <button id="saveGoalBtn">Save</button>
                </div>
                
                <div style="max-width: 500px; margin: 0 auto; text-align: left;">
                    <p id="progressText" style="margin-bottom: 8px; font-weight: bold; color: var(--primary-color);">Progress: Calculating...</p>

                    <div style="background-color: #e2e8f0; border-radius: 10px; height: 22px; width: 100%; overflow: hidden;">
                        <div id="progressBar" style="background-color: #00b8a3; width: 0%; height: 100%; transition: width 1s ease-in-out;"></div>
                    </div>
                </div>
            </section>
            <section class="cards">
                <div class="card">
                    <h3>Toplam</h3>
                    <p id="totalSolved" class="stat-number">0</p>
                </div>
                <div class="card diff-easy">
                    <h3>Easy</h3>
                    <p id="easySolved" class="stat-number">0</p>
                </div>
                <div class="card diff-medium">
                    <h3>Medium</h3>
                    <p id="mediumSolved" class="stat-number">0</p>
                </div>
                <div class="card diff-hard">
                    <h3>Hard</h3>
                    <p id="hardSolved" class="stat-number">0</p>
                </div>
            </section>

            <section class="charts">
                <div class="chart-container">
                    <canvas id="difficultyChart"></canvas>
                </div>

                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
